services:
  postgres:
    container_name: commit-grow-local-postgres
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: commit_grow
      POSTGRES_PASSWORD: commit_grow
      POSTGRES_DB: commit_grow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    container_name: commit-grow-local-redis
    image: redis:7.4
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
